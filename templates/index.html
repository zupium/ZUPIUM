<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ZUPIUM — AI Chat Assistant</title>
<meta name="description" content="ZUPIUM, asisten AI cepat dan gratis.">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="app">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <div class="brand">
        <span class="brand-mark">Z</span>
        <span class="brand-name">ZUPIUM</span>
      </div>
      <button class="icon-btn" id="closeSidebarBtn" aria-label="Tutup sidebar">✕</button>
    </div>

    <button class="new-chat-btn" id="newChatBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      Obrolan baru
    </button>

    <div class="conv-list" id="convList"></div>

    <div class="sidebar-bottom">
      <div class="status-pill" id="statusPill">
        <span class="dot"></span> Online · Groq Llama 3.3
      </div>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <main class="main">
    <header class="topbar">
      <button class="icon-btn" id="openSidebarBtn" aria-label="Buka sidebar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
      <h1 class="conv-title" id="convTitle">Obrolan baru</h1>
      <button class="icon-btn" id="clearChatBtn" title="Hapus obrolan ini" aria-label="Hapus obrolan">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2m2 0-1 14a1 1 0 0 1-1 1H8a1 1 0 0 1-1-1L6 6h12Z"/></svg>
      </button>
    </header>

    <section class="chat-scroll" id="chatScroll">
      <div class="empty-state" id="emptyState">
        <div class="empty-glow"></div>
        <h2>Hai, saya <span class="grad-text">ZUPIUM</span></h2>
        <p>Asisten AI yang cepat, gratis, dan siap bantu apa saja — dari ngobrol santai sampai ngoding.</p>
        <div class="suggestions">
          <button class="sugg-card" data-prompt="Jelaskan apa itu machine learning untuk pemula">
            <strong>Jelaskan konsep</strong>
            <span>Apa itu machine learning?</span>
          </button>
          <button class="sugg-card" data-prompt="Buatkan fungsi Python untuk mengecek bilangan prima">
            <strong>Bantu ngoding</strong>
            <span>Fungsi cek bilangan prima</span>
          </button>
          <button class="sugg-card" data-prompt="Berikan ide nama dan tagline untuk startup teknologi AI">
            <strong>Brainstorming</strong>
            <span>Ide nama startup AI</span>
          </button>
          <button class="sugg-card" data-prompt="Buatkan rencana belajar coding selama 30 hari untuk pemula">
            <strong>Buat rencana</strong>
            <span>Belajar coding 30 hari</span>
          </button>
        </div>
      </div>

      <div class="messages" id="messages"></div>
    </section>

    <form class="composer" id="composerForm">
      <div class="composer-inner">
        <textarea
          id="messageInput"
          placeholder="Tulis pesan ke ZUPIUM..."
          rows="1"
          autocomplete="off"
        ></textarea>
        <button type="submit" class="send-btn" id="sendBtn" aria-label="Kirim pesan">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </button>
      </div>
      <p class="composer-hint">ZUPIUM bisa saja salah. Periksa kembali info penting.</p>
    </form>
  </main>
</div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
